name: CI

on:
  push:
    branches: [main, phase-1, phase-2]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxtst-dev libxkbcommon-dev \
            libasound-dev portaudio19-dev libportaudio2 libpulse-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev libgtk-3-dev

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Build CLI
        run: CGO_ENABLED=1 go build -v -o tomoe ./cmd/tomoe

      - name: Build GUI
        run: CGO_ENABLED=1 go build -v -tags webkit2_41 -o tomoe-gui ./cmd/tomoe-gui

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libx11-dev libxtst-dev libxkbcommon-dev \
            libasound-dev portaudio19-dev libportaudio2 libpulse-dev \
            libwebkit2gtk-4.1-dev libappindicator3-dev libgtk-3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
